syntax = "proto3";

package countryapi;

service CountryService {
  rpc GetAllCountries (Empty) returns (CountryList) {}
  rpc GetCountryDetails (GetCountryDetailsRequest) returns (CountryDetails) {}
}

message Empty {}

message GetCountryDetailsRequest {
  string code = 1;
}

message Country {
  string code = 1;
  string name = 2;
}

message CountryList {
  repeated Country countries = 1;
}

message CountryDetails {
  string code = 1;
  string name = 2;
  string currency = 3;
  string taxName = 4;
  float taxPercentage = 5;
  string taxType = 6;
  bool taxIncluded = 7;
}
