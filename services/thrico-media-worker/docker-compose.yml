version: '3.8'

services:
  thrico-media-worker:
    build:
      context: ../../
      dockerfile: services/thrico-media-worker/Dockerfile
    container_name: thrico-media-worker
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - DATABASE_URL=${DATABASE_URL}
      - MAX_CONCURRENT_JOBS=3
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
